# @req SCI-HELM-001
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sdd-navigator.fullname" . }}
  labels:
    {{- include "sdd-navigator.componentLabels" (dict "context" . "component" "api") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 4010
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "sdd-navigator.componentSelectorLabels" (dict "context" . "component" "api") | nindent 4 }}
