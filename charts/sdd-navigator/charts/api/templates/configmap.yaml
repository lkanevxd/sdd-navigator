# @req SCI-HELM-005
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sdd-navigator.fullname" . }}-config
  labels:
    {{- include "sdd-navigator.componentLabels" (dict "context" . "component" "api") | nindent 4 }}
data:
  API_PORT: {{ .Values.port | quote }}
  DATABASE_HOST: {{ .Values.database.host | quote }}
  DATABASE_PORT: {{ .Values.database.port | quote }}
  DATABASE_NAME: {{ .Values.database.name | quote }}
  DATABASE_URL: "postgresql://{{ .Values.database.user }}@{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}"
  LOG_LEVEL: {{ .Values.logLevel | quote }}
