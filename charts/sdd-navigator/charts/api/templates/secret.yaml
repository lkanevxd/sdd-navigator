# @req SCI-HELM-005
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sdd-navigator.fullname" . }}-secret
  labels:
    {{- include "sdd-navigator.componentLabels" (dict "context" . "component" "api") | nindent 4 }}
type: Opaque
data:
  DATABASE_USER: {{ .Values.database.user | b64enc | quote }}
  DATABASE_PASSWORD: {{ .Values.database.password | b64enc | quote }}
