# @req SCI-HELM-001, SCI-SEC-001
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sdd-navigator.fullname" . }}
  labels:
    {{- include "sdd-navigator.componentLabels" (dict "context" . "component" "api") | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "sdd-navigator.componentSelectorLabels" (dict "context" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sdd-navigator.componentSelectorLabels" (dict "context" . "component" "api") | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "sdd-navigator.fullname" . }}-config
            - secretRef:
                name: {{ include "sdd-navigator.fullname" . }}-secret
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
