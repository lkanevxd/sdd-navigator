# @req SCI-HELM-003
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sdd-navigator.fullname" . }}
  labels:
    {{- include "sdd-navigator.componentLabels" (dict "context" . "component" "frontend") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "sdd-navigator.componentSelectorLabels" (dict "context" . "component" "frontend") | nindent 4 }}
