# @req SCI-HELM-002, SCI-HELM-006
apiVersion: v2
name: sdd-navigator
description: Umbrella Helm chart for SDD Navigator stack (API, Frontend, PostgreSQL)
type: application
version: 1.0.0
appVersion: "3.0.0"

dependencies:
  - name: api
    version: 1.0.0
    repository: "file://charts/api"
  - name: frontend
    version: 1.0.0
    repository: "file://charts/frontend"
  - name: postgresql
    version: 16.4.1
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: postgresql.enabled
