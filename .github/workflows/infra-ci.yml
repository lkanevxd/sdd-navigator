# @req SCI-CI-001, SCI-CI-002, SCI-CI-999
name: Infrastructure CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  # @req SCI-CI-001
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Build Helm dependencies
        run: helm dependency build charts/sdd-navigator/

      - name: Run helm lint (strict)
        run: helm lint charts/sdd-navigator/ --strict

  # @req SCI-CI-002
  helm-validate:
    name: Helm Template Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin kubeconform

      - name: Build Helm dependencies
        run: helm dependency build charts/sdd-navigator/

      - name: Render and validate manifests
        run: |
          helm template sdd-navigator charts/sdd-navigator/ \
            | kubeconform --strict --summary --kubernetes-version 1.30.0

  # @req SCI-CI-001
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Run ansible-lint
        run: ansible-lint ansible/

  # @req SCI-CI-001
  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint -c .yamllint.yml .

  # @req SCI-TRACE-001
  traceability:
    name: Traceability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run traceability check
        run: bash scripts/check-traceability.sh

  # @req SCI-CI-001
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [helm-lint, helm-validate, ansible-lint, yamllint, traceability]
    if: always()
    steps:
      - name: Produce summary
        run: |
          echo "## Infrastructure CI Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Helm Lint | ${{ needs.helm-lint.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Helm Validate | ${{ needs.helm-validate.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Ansible Lint | ${{ needs.ansible-lint.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| YAML Lint | ${{ needs.yamllint.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Traceability | ${{ needs.traceability.result }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any job failed
        if: contains(needs.*.result, 'failure')
        run: exit 1
