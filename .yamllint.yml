extends: relaxed

ignore: |
  charts/sdd-navigator/templates/
  charts/sdd-navigator/charts/api/templates/
  charts/sdd-navigator/charts/frontend/templates/
  charts/sdd-navigator/charts/*/templates/

rules:
  line-length:
    max: 150
  comments:
    min-spaces-from-content: 1
  octal-values:
    forbid-implicit-octal: true
    forbid-explicit-octal: true
